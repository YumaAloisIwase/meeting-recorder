<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>盲录職猫颅掳茅聦虏茅聼鲁茫聜路茫聜鹿茫聝聠茫聝聽</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Yu Gothic UI', Arial, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { text-align: center; padding: 40px; max-width: 500px; width: 100%; }
h1 { font-size: 1.4em; margin-bottom: 20px; color: #e94560; }

/* 盲录職猫颅掳氓聬聧氓聟楼氓聤聸 */
.name-input { margin-bottom: 24px; }
.name-input input {
  width: 100%; padding: 10px 14px; font-size: 1em; border: 2px solid #333;
  border-radius: 8px; background: #16213e; color: #eee; text-align: center;
  transition: border-color 0.2s;
}
.name-input input:focus { border-color: #e94560; outline: none; }
.name-input input::placeholder { color: #666; }
.name-input input:disabled { opacity: 0.5; }

#timer { font-size: 4em; font-weight: 300; letter-spacing: 4px; margin: 20px 0; font-variant-numeric: tabular-nums; }
#status { font-size: 1.2em; margin: 15px 0; }
.recording #status { color: #e94560; }
.idle #status { color: #888; }
.done #status { color: #43a047; }
#pulse { width: 16px; height: 16px; border-radius: 50%; background: #e94560; display: inline-block; margin-right: 8px; vertical-align: middle; }
.recording #pulse { animation: pulse 1s infinite; }
.idle #pulse, .done #pulse { display: none; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* 茫聝聹茫聜驴茫聝鲁 */
#controls { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }
button {
  padding: 14px 36px; font-size: 1.05em; border: none; border-radius: 8px;
  cursor: pointer; transition: all 0.2s; font-weight: 600;
}
#startBtn { background: #e94560; color: #fff; flex: 1; max-width: 200px; }
#startBtn:hover:not(:disabled) { background: #c23152; transform: translateY(-1px); }
#startBtn:disabled { opacity: 0.3; cursor: not-allowed; }
#stopBtn { background: #333; color: #fff; flex: 1; max-width: 200px; }
#stopBtn:hover:not(:disabled) { background: #555; transform: translateY(-1px); }
#stopBtn:disabled { opacity: 0.3; cursor: not-allowed; }
#resetBtn { background: transparent; color: #888; border: 1px solid #444; padding: 8px 16px; font-size: 0.85em; margin-top: 12px; border-radius: 6px; }
#resetBtn:hover { color: #eee; border-color: #888; }

/* 茫聝聙茫聜娄茫聝鲁茫聝颅茫聝录茫聝聣 */
#downloadArea { margin-top: 24px; display: none; }
#downloadArea a {
  display: inline-block; padding: 12px 24px; background: #43a047; color: #fff;
  text-decoration: none; border-radius: 8px; font-weight: 600; transition: all 0.2s;
}
#downloadArea a:hover { background: #388e3c; transform: translateY(-1px); }
#fileInfo { margin-top: 8px; font-size: 0.85em; color: #888; }

/* 茫聝颅茫聜掳 */
#log { margin-top: 24px; font-size: 0.8em; color: #555; max-height: 120px; overflow-y: auto; text-align: left; background: #111; border-radius: 8px; padding: 8px 12px; }

/* 茫聝聮茫聝鲁茫聝聢 */
.hint { margin-top: 16px; font-size: 0.75em; color: #444; }
</style>
</head>
<body class="idle">
<div class="container">
  <h1>冒聼聨聶茂赂聫 盲录職猫颅掳茅聦虏茅聼鲁茫聜路茫聜鹿茫聝聠茫聝聽</h1>
  <div class="name-input">
    <input type="text" id="nameInput" placeholder="盲录職猫颅掳氓聬聧茫聜聮氓聟楼氓聤聸茂录聢盲戮聥: 茅聝篓茅聳聙茅聲路盲录職猫颅掳茂录聣" value="">
  </div>
  <div id="timer">00:00:00</div>
  <div id="status"><span id="pulse"></span><span id="statusText">茅聦虏茅聼鲁氓戮聟忙漏聼盲赂颅</span></div>
  <div id="controls">
    <button id="startBtn" onclick="startRecording()">芒聫潞 茅聦虏茅聼鲁茅聳聥氓搂聥</button>
    <button id="stopBtn" onclick="stopRecording()" disabled>芒聫鹿 茅聦虏茅聼鲁氓聛聹忙颅垄</button>
  </div>
  <button id="resetBtn" onclick="resetRecorder()" style="display:none;">冒聼聰聞 茫聝陋茫聜禄茫聝聝茫聝聢茂录聢忙聳掳茫聛聴茫聛聞茅聦虏茅聼鲁茂录聣</button>
  <div id="downloadArea">
    <a id="dlLink" href="#" download="">冒聼聯楼 茫聝聙茫聜娄茫聝鲁茫聝颅茫聝录茫聝聣</a>
    <div id="fileInfo"></div>
  </div>
  <div id="log"></div>
  <div class="hint">冒聼聮隆 Claude茫聜鹿茫聜卤茫聜赂茫聝楼茫聝录茫聝漏茫聝录茫聛聥茫聜聣茫聛庐猫聡陋氓聥聲忙聯聧盲陆聹茫聛芦茫聜聜氓炉戮氓驴聹茫聛聴茫聛娄茫聛聞茫聛戮茫聛聶</div>
</div>
<script>
let mediaRecorder = null;
let audioChunks = [];
let startTime = null;
let timerInterval = null;
let meetingInfo = { name: '', date: '' };

// URL茫聝聭茫聝漏茫聝隆茫聝录茫聜驴茫聛聥茫聜聣盲录職猫颅掳忙聝聟氓聽卤茫聜聮氓聫聳氓戮聴
const params = new URLSearchParams(window.location.search);
if (params.get('name')) {
  meetingInfo.name = decodeURIComponent(params.get('name'));
  document.getElementById('nameInput').value = meetingInfo.name;
}
if (params.get('autostart') === 'true') {
  window.addEventListener('load', () => setTimeout(startRecording, 1000));
}

function log(msg) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP');
  el.innerHTML = `[${t}] ${msg}<br>` + el.innerHTML;
  console.log(`[MeetingRecorder] ${msg}`);
}

function updateTimer() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
  const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${h}:${m}:${s}`;
}

function getMeetingName() {
  return document.getElementById('nameInput').value.trim() || '莽聞隆茅隆聦茫聛庐盲录職猫颅掳';
}

async function startRecording() {
  try {
    meetingInfo.name = getMeetingName();
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
    });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = handleStop;
    mediaRecorder.start(1000);
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    document.body.className = 'recording';
    document.getElementById('statusText').textContent = '茅聦虏茅聼鲁盲赂颅: ' + meetingInfo.name;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('nameInput').disabled = true;
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('downloadArea').style.display = 'none';
    log('茅聦虏茅聼鲁茅聳聥氓搂聥: ' + meetingInfo.name);
  } catch (err) {
    log('茫聜篓茫聝漏茫聝录: ' + err.message);
    alert('茫聝聻茫聜陇茫聜炉茫聛赂茫聛庐茫聜垄茫聜炉茫聜禄茫聜鹿茫聜聮猫篓卤氓聫炉茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞茫聙聜');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    clearInterval(timerInterval);
    document.body.className = 'done';
    document.getElementById('statusText').textContent = '茅聦虏茅聼鲁氓庐聦盲潞聠 - 氓聡娄莽聬聠盲赂颅...';
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = true;
    log('茅聦虏茅聼鲁氓聛聹忙颅垄');
  }
}

function handleStop() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 10);
  const safeName = meetingInfo.name.replace(/[<>:"/\\|?*]/g, '_') || 'meeting';
  const filename = dateStr + '_' + safeName + '.webm';

  const url = URL.createObjectURL(blob);
  const dlArea = document.getElementById('downloadArea');
  const dlLink = document.getElementById('dlLink');
  dlLink.href = url;
  dlLink.download = filename;
  dlLink.textContent = '冒聼聯楼 ' + filename + ' 茫聜聮茫聝聙茫聜娄茫聝鲁茫聝颅茫聝录茫聝聣';
  dlArea.style.display = 'block';
  document.getElementById('fileInfo').textContent =
    '茫聜碌茫聜陇茫聜潞: ' + (blob.size / 1024 / 1024).toFixed(1) + 'MB | 茅聦虏茅聼鲁忙聶聜茅聳聯: ' + document.getElementById('timer').textContent;

  // 猫聡陋氓聥聲茫聝聙茫聜娄茫聝鲁茫聝颅茫聝录茫聝聣
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();

  document.getElementById('statusText').textContent = '茅聦虏茅聼鲁氓庐聦盲潞聠: ' + filename;
  document.getElementById('resetBtn').style.display = 'inline-block';
  log('盲驴聺氓颅聵氓庐聦盲潞聠: ' + filename + ' (' + (blob.size / 1024 / 1024).toFixed(1) + 'MB)');

  window.recordingBlob = blob;
  window.recordingFilename = filename;
  window.recordingReady = true;
}

function resetRecorder() {
  audioChunks = [];
  window.recordingBlob = null;
  window.recordingFilename = null;
  window.recordingReady = false;
  document.getElementById('downloadArea').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  document.body.className = 'idle';
  document.getElementById('statusText').textContent = '茅聦虏茅聼鲁氓戮聟忙漏聼盲赂颅';
  document.getElementById('timer').textContent = '00:00:00';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('nameInput').disabled = false;
  startTime = null;
  log('茫聝陋茫聜禄茫聝聝茫聝聢氓庐聦盲潞聠');
}

function setMeetingName(name) {
  meetingInfo.name = name;
  document.getElementById('nameInput').value = name;
  log('盲录職猫颅掳氓聬聧茫聜聮猫篓颅氓庐職: ' + name);
}

// 氓陇聳茅聝篓氓聢露氓戮隆API
window.MeetingRecorder = {
  start: startRecording,
  stop: stopRecording,
  setName: setMeetingName,
  isRecording: () => mediaRecorder && mediaRecorder.state === 'recording',
  getState: () => mediaRecorder ? mediaRecorder.state : 'inactive',
  getDuration: () => startTime ? Math.floor((Date.now() - startTime) / 1000) : 0,
  getMeetingName: () => meetingInfo.name,
  getFilename: () => window.recordingFilename || null,
  getBlobSize: () => window.recordingBlob ? window.recordingBlob.size : 0,
  isReady: () => window.recordingReady === true,
  reset: resetRecorder
};
</script>
</body>
</html>
