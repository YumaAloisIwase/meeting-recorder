<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議録音システム</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ef5350'/%3E%3Cstop offset='100%25' stop-color='%23c62828'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Crect x='24' y='10' width='16' height='28' rx='8' fill='white'/%3E%3Cpath d='M18 30 a14 14 0 0 0 28 0' fill='none' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='32' y1='44' x2='32' y2='52' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='24' y1='52' x2='40' y2='52' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Yu Gothic UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f5f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { text-align: center; padding: 40px; max-width: 500px; width: 100%; background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); margin: 20px; }
h1 { font-size: 1.4em; margin-bottom: 20px; color: #d32f2f; }

.folder-setup { margin-bottom: 16px; padding: 10px; background: #f9f9f9; border-radius: 8px; border: 1px solid #e0e0e0; }
#folderBtn {
  background: #fff; color: #555; border: 1px solid #ccc; padding: 6px 14px;
  font-size: 0.85em; border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
#folderBtn:hover { background: #f5f5f5; border-color: #999; }
#folderStatus { margin-top: 6px; font-size: 0.8em; }
#permissionBar { display: none; margin-top: 8px; }
#permissionBtn {
  background: #1a73e8; color: #fff; border: none; padding: 6px 14px;
  font-size: 0.85em; border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
#permissionBtn:hover { background: #1557b0; }

.name-input { margin-bottom: 24px; }
.name-input input {
  width: 100%; padding: 10px 14px; font-size: 1em; border: 2px solid #ddd;
  border-radius: 8px; background: #fafafa; color: #333; text-align: center;
  transition: border-color 0.2s;
}
.name-input input:focus { border-color: #d32f2f; outline: none; }
.name-input input::placeholder { color: #999; }
.name-input input:disabled { opacity: 0.5; }
/* 録音中ファイル名変更可 */
.name-input input.recording-editable { border-color: #ff9800; background: #fff9f0; }
#renameHint { display: none; margin-top: 4px; font-size: 0.75em; color: #ff9800; font-weight: 600; }

#timer { font-size: 4em; font-weight: 300; letter-spacing: 4px; margin: 20px 0; font-variant-numeric: tabular-nums; color: #222; }
#status { font-size: 1.2em; margin: 15px 0; }
.recording #status { color: #d32f2f; }
.idle #status { color: #888; }
.done #status { color: #2e7d32; }
#pulse { width: 16px; height: 16px; border-radius: 50%; background: #d32f2f; display: inline-block; margin-right: 8px; vertical-align: middle; }
.recording #pulse { animation: pulse 1s infinite; }
.idle #pulse, .done #pulse { display: none; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

#controls { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }
button {
  padding: 14px 36px; font-size: 1.05em; border: none; border-radius: 8px;
  cursor: pointer; transition: all 0.2s; font-weight: 600;
}
#startBtn { background: #d32f2f; color: #fff; flex: 1; max-width: 200px; }
#startBtn:hover:not(:disabled) { background: #b71c1c; transform: translateY(-1px); }
#startBtn:disabled { opacity: 0.3; cursor: not-allowed; }
#stopBtn { background: #555; color: #fff; flex: 1; max-width: 200px; }
#stopBtn:hover:not(:disabled) { background: #333; transform: translateY(-1px); }
#stopBtn:disabled { opacity: 0.3; cursor: not-allowed; }
#cancelBtn { background: transparent; color: #d32f2f; border: 1px solid #d32f2f; padding: 8px 16px; font-size: 0.85em; margin-top: 12px; border-radius: 6px; display: none; }
#cancelBtn:hover { background: #ffebee; color: #b71c1c; border-color: #b71c1c; }
#resetBtn { background: transparent; color: #888; border: 1px solid #ccc; padding: 8px 16px; font-size: 0.85em; margin-top: 12px; border-radius: 6px; }
#resetBtn:hover { color: #333; border-color: #888; }

#saveArea { margin-top: 24px; display: none; }
#saveStatus { font-size: 1em; font-weight: 600; margin-bottom: 4px; }
#fileInfo { font-size: 0.85em; color: #888; }

#log { margin-top: 24px; font-size: 0.8em; color: #666; max-height: 120px; overflow-y: auto; text-align: left; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 8px 12px; }

.hint { margin-top: 16px; font-size: 0.75em; color: #aaa; }

/* Folder notification popup */
#folderNotification {
  display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #fff3e0; border: 2px solid #ff9800; border-radius: 12px; padding: 16px 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15); z-index: 9999; max-width: 420px; text-align: center;
  animation: slideDown 0.3s ease-out;
}
#folderNotification .notif-title { font-weight: 700; color: #e65100; margin-bottom: 6px; font-size: 1em; }
#folderNotification .notif-body { font-size: 0.85em; color: #555; margin-bottom: 10px; line-height: 1.5; }
#folderNotification .notif-path { font-size: 0.75em; color: #888; background: #f5f5f5; padding: 4px 8px; border-radius: 4px; word-break: break-all; margin-bottom: 10px; }
#folderNotification .notif-actions { display: flex; gap: 8px; justify-content: center; }
#folderNotification .notif-btn {
  padding: 8px 18px; border-radius: 6px; font-size: 0.9em; font-weight: 600; cursor: pointer; border: none;
}
#folderNotification .notif-btn.primary { background: #ff9800; color: #fff; }
#folderNotification .notif-btn.primary:hover { background: #f57c00; }
#folderNotification .notif-btn.secondary { background: #eee; color: #555; }
#folderNotification .notif-btn.secondary:hover { background: #ddd; }
@keyframes slideDown { from { top: -80px; opacity: 0; } to { top: 20px; opacity: 1; } }
</style>
</head>
<body class="idle">
<div class="container">
  <h1>&#x1F399;&#xFE0F; 会議録音システム</h1>

  <!-- Folder notification popup -->
  <div id="folderNotification">
    <div class="notif-title">&#x1F4C1; 保存先フォルダが未設定です</div>
    <div class="notif-body">録音ファイルをGoogle Driveに自動同期するには、<br>以下のフォルダを選択してください：</div>
    <div class="notif-path">会議録音アーカイブ<br><span style="font-size:0.9em; color:#aaa;">（デスクトップ → 念のため保存 → GoogleDrive同期用 → 会議録音アーカイブ）</span></div>
    <div class="notif-actions">
      <button class="notif-btn primary" onclick="setupFolder(); closeFolderNotification();">フォルダを選択</button>
      <button class="notif-btn secondary" onclick="closeFolderNotification();">あとで</button>
    </div>
  </div>

  <div class="folder-setup">
    <button id="folderBtn" onclick="setupFolder()">&#x1F4C1; 保存先フォルダを設定</button>
    <div id="folderStatus">&#x26A0;&#xFE0F; 保存先未設定（ダウンロードフォルダに保存されます）</div>
    <div id="folderGuide" style="font-size:0.75em; color:#999; margin-top:4px; display:none;">選択先: デスクトップ → 念のため保存 → GoogleDrive同期用 → 会議録音アーカイブ</div>
    <div id="permissionBar">
      <button id="permissionBtn" onclick="requestFolderPermission()">&#x1F513; フォルダアクセスを許可</button>
    </div>
  </div>

  <div class="name-input">
    <input type="text" id="nameInput" placeholder="会議名を入力（例: 部門長会議）" value="">
    <div id="renameHint">✏️ 録音中もファイル名を変更できます（停止時に反映）</div>
  </div>
  <div id="timer">00:00:00</div>
  <div id="status"><span id="pulse"></span><span id="statusText">録音待機中</span></div>
  <div id="controls">
    <button id="startBtn" onclick="startRecording()">&#x23FA; 録音開始</button>
    <button id="stopBtn" onclick="stopRecording()" disabled>&#x23F9; 録音停止</button>
  </div>
  <button id="cancelBtn" onclick="cancelRecording()">&#x1F6AB; キャンセル（録音破棄）</button>
  <button id="resetBtn" onclick="resetRecorder()" style="display:none;">&#x1F504; リセット（新しい録音）</button>

  <div id="saveArea">
    <div id="saveStatus"></div>
    <div id="fileInfo"></div>
  </div>

  <div id="log"></div>
  <div class="hint">&#x1F4A1; Claudeスケジューラーからの自動操作にも対応しています</div>
</div>
<script>
/* ======== Recording State ======== */
var mediaRecorder = null;
var audioChunks = [];
var startTime = null;
var timerInterval = null;
var meetingInfo = { name: '', date: '' };

// Flags for scheduler coordination
window.isUploading = false;
window.uploadComplete = false;
window.isSaving = false;
window.saveComplete = false;

/* ======== IndexedDB for Directory Handle ======== */
var DB_NAME = 'MeetingRecorderDB';
var STORE_NAME = 'settings';
var dirHandle = null;
var folderPermissionGranted = false;

function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = function(e) { e.target.result.createObjectStore(STORE_NAME); };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function saveDirHandle(handle) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(handle, 'dirHandle');
      tx.oncomplete = resolve;
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

function loadDirHandle() {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(STORE_NAME, 'readonly');
      var req = tx.objectStore(STORE_NAME).get('dirHandle');
      req.onsuccess = function() { resolve(req.result || null); };
      req.onerror = function() { reject(req.error); };
    });
  });
}

/* ======== Folder Setup (File System Access API) ======== */
async function setupFolder() {
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await saveDirHandle(dirHandle);
    folderPermissionGranted = true;
    updateFolderUI('granted');
    closeFolderNotification();
    log('保存先フォルダを設定: ' + dirHandle.name);
  } catch (e) {
    if (e.name !== 'AbortError') {
      log('フォルダ設定エラー: ' + e.message);
    }
  }
}

async function requestFolderPermission() {
  if (!dirHandle) return;
  try {
    var perm = await dirHandle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      folderPermissionGranted = true;
      updateFolderUI('granted');
      log('フォルダアクセス許可済み: ' + dirHandle.name);
    } else {
      updateFolderUI('denied');
      log('フォルダアクセス拒否');
    }
  } catch (e) {
    log('パーミッション要求エラー: ' + e.message);
    updateFolderUI('denied');
  }
}

function updateFolderUI(state) {
  var statusEl = document.getElementById('folderStatus');
  var btnEl = document.getElementById('folderBtn');
  var permBar = document.getElementById('permissionBar');
  var guideEl = document.getElementById('folderGuide');

  if (!dirHandle) {
    statusEl.innerHTML = '&#x26A0;&#xFE0F; 保存先未設定（ダウンロードフォルダに保存されます）';
    statusEl.style.color = '#f57c00';
    permBar.style.display = 'none';
    if (guideEl) guideEl.style.display = 'block';
    return;
  }

  if (guideEl) guideEl.style.display = 'none';

  if (state === 'granted') {
    statusEl.innerHTML = '&#x2705; ' + dirHandle.name + '（年月フォルダに自動振り分け → Google Drive同期）';
    statusEl.style.color = '#2e7d32';
    btnEl.innerHTML = '&#x1F4C1; フォルダ変更';
    permBar.style.display = 'none';
  } else if (state === 'prompt') {
    statusEl.innerHTML = '&#x1F513; ' + dirHandle.name + '（アクセス許可が必要です）';
    statusEl.style.color = '#f57c00';
    btnEl.innerHTML = '&#x1F4C1; フォルダ変更';
    permBar.style.display = 'block';
  } else {
    statusEl.innerHTML = '&#x274C; アクセス拒否 - フォルダを再設定してください';
    statusEl.style.color = '#d32f2f';
    permBar.style.display = 'none';
  }
}

function showFolderNotification() {
  var el = document.getElementById('folderNotification');
  if (el) el.style.display = 'block';
}

function closeFolderNotification() {
  var el = document.getElementById('folderNotification');
  if (el) el.style.display = 'none';
}

async function initFolder() {
  // Check if File System Access API is supported
  if (!window.showDirectoryPicker) {
    document.getElementById('folderStatus').innerHTML = '&#x2139;&#xFE0F; このブラウザはフォルダ直接保存に非対応（ダウンロードで保存）';
    document.getElementById('folderStatus').style.color = '#888';
    document.getElementById('folderBtn').style.display = 'none';
    return;
  }

  try {
    dirHandle = await loadDirHandle();
    if (dirHandle) {
      // Check current permission state without triggering a prompt
      var perm = await dirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        folderPermissionGranted = true;
        updateFolderUI('granted');
        log('保存先フォルダ復元: ' + dirHandle.name);
      } else {
        folderPermissionGranted = false;
        updateFolderUI('prompt');
        log('保存先フォルダ復元: ' + dirHandle.name + '（要パーミッション）');
      }
    } else {
      updateFolderUI(null);
      // Show notification popup when no folder is configured
      setTimeout(showFolderNotification, 500);
    }
  } catch (e) {
    log('フォルダ復元エラー: ' + e.message);
    updateFolderUI(null);
    setTimeout(showFolderNotification, 500);
  }
}

/* ======== File Save Logic ======== */
function getMonthStr() {
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  return y + '-' + m;
}

function getDateStr() {
  var now = new Date();
  return now.toISOString().slice(0, 10);
}

async function saveFile(blob, filename) {
  var monthStr = getMonthStr();

  // Try File System Access API first
  if (dirHandle && folderPermissionGranted) {
    try {
      // Verify permission is still valid
      var perm = await dirHandle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') {
        perm = await dirHandle.requestPermission({ mode: 'readwrite' });
      }
      if (perm === 'granted') {
        // Get or create month subfolder
        var monthDir = await dirHandle.getDirectoryHandle(monthStr, { create: true });

        // Write file
        var fileHandle = await monthDir.getFileHandle(filename, { create: true });
        var writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();

        var path = dirHandle.name + '/' + monthStr + '/' + filename;
        log('フォルダに保存完了: ' + path);
        return { success: true, path: path, method: 'folder' };
      }
    } catch (e) {
      log('フォルダ保存エラー: ' + e.message + ' → ダウンロードにフォールバック');
    }
  }

  // Fallback: browser download
  try {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
    log('ダウンロード保存: ' + filename);
    return { success: true, path: filename, method: 'download' };
  } catch (e) {
    log('ダウンロード保存エラー: ' + e.message);
    return { success: false, error: e.message };
  }
}

/* ======== URL Params / Autostart ======== */
var params = new URLSearchParams(window.location.search);
if (params.get('name')) {
  meetingInfo.name = decodeURIComponent(params.get('name'));
  document.getElementById('nameInput').value = meetingInfo.name;
}
if (params.get('autostart') === 'true') {
  window.addEventListener('load', function() { setTimeout(startRecording, 1000); });
}

/* ======== Logging ======== */
function log(msg) {
  var el = document.getElementById('log');
  var t = new Date().toLocaleTimeString('ja-JP');
  el.innerHTML = '[' + t + '] ' + msg + '<br>' + el.innerHTML;
  console.log('[MeetingRecorder] ' + msg);
}

/* ======== Timer ======== */
function updateTimer() {
  if (!startTime) return;
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
  var m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
  var s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timer').textContent = h + ':' + m + ':' + s;
}

function getMeetingName() {
  return document.getElementById('nameInput').value.trim() || '無題の会議';
}

/* ======== Recording Controls ======== */
async function startRecording() {
  try {
    meetingInfo.name = getMeetingName();
    var stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
    });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = handleStop;
    mediaRecorder.start(1000);
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    document.body.className = 'recording';
    document.getElementById('statusText').textContent = '録音中: ' + meetingInfo.name;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('nameInput').classList.add('recording-editable');
    document.getElementById('renameHint').style.display = 'block';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('saveArea').style.display = 'none';
    window.saveComplete = false;
    window.isSaving = false;
    window.uploadComplete = false;
    window.isUploading = false;
    log('録音開始: ' + meetingInfo.name);
  }
}

document.getElementById('nameInput').addEventListener('input', function() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    document.getElementById('statusText').textContent = '録音中: ' + (document.getElementById('nameInput').value.trim() || '無題の会議');
  }
 catch (err) {
    log('エラー: ' + err.message);
    alert('マイクへのアクセスを許可してください。');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(function(t) { t.stop(); });
    clearInterval(timerInterval);
    document.body.className = 'done';
    document.getElementById('statusText').textContent = '録音完了 - 保存中...';
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('nameInput').classList.remove('recording-editable');
    document.getElementById('renameHint').style.display = 'none';
    log('録音停止');
  }
}

function handleStop() {
  var blob = new Blob(audioChunks, { type: 'audio/webm' });
  var dateStr = getDateStr();
  var safeName = getMeetingName().replace(/[<>:"\/\\|?*]/g, '_') || 'meeting';
  var filename = dateStr + '_' + safeName + '.webm';

  document.getElementById('saveArea').style.display = 'block';
  document.getElementById('fileInfo').textContent =
    'サイズ: ' + (blob.size / 1024 / 1024).toFixed(1) + 'MB | 録音時間: ' + document.getElementById('timer').textContent;
  document.getElementById('resetBtn').style.display = 'inline-block';

  window.recordingBlob = blob;
  window.recordingFilename = filename;
  window.recordingReady = true;
  window.isSaving = true;

  var saveStatusEl = document.getElementById('saveStatus');
  saveStatusEl.textContent = '💾 保存中...';
  saveStatusEl.style.color = '#1a73e8';

  saveFile(blob, filename).then(function(result) {
    window.isSaving = false;
    if (result.success) {
      window.saveComplete = true;
      window.uploadComplete = true; // backward compat for scheduler
      if (result.method === 'folder') {
        saveStatusEl.textContent = '✅ ' + result.path;
        saveStatusEl.style.color = '#2e7d32';
        document.getElementById('statusText').textContent = '録音完了: ' + result.path;
      } else {
        saveStatusEl.textContent = '⬇️ ダウンロードフォルダに保存しました';
        saveStatusEl.style.color = '#f57c00';
        document.getElementById('statusText').textContent = '録音完了: ' + filename;
      }
      log('保存完了: ' + filename + ' (' + (blob.size / 1024 / 1024).toFixed(1) + 'MB)');
    } else {
      saveStatusEl.textContent = '❌ 保存エラー: ' + result.error;
      saveStatusEl.style.color = '#d32f2f';
      document.getElementById('statusText').textContent = '録音完了（保存エラー）';
    }
  });
}

function cancelRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.onstop = null;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(function(t) { t.stop(); });
    clearInterval(timerInterval);
  }
  audioChunks = [];
  mediaRecorder = null;
  startTime = null;
  document.body.className = 'idle';
  document.getElementById('statusText').textContent = '録音待機中（キャンセル済み）';
  document.getElementById('timer').textContent = '00:00:00';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('nameInput').disabled = false;
  document.getElementById('nameInput').classList.remove('recording-editable');
  document.getElementById('renameHint').style.display = 'none';
  document.getElementById('saveArea').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  log('録音キャンセル - ファイルは保存されません');
}

function resetRecorder() {
  audioChunks = [];
  window.recordingBlob = null;
  window.recordingFilename = null;
  window.recordingReady = false;
  window.saveComplete = false;
  window.isSaving = false;
  window.uploadComplete = false;
  window.isUploading = false;
  document.getElementById('saveArea').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  document.body.className = 'idle';
  document.getElementById('statusText').textContent = '録音待機中';
  document.getElementById('timer').textContent = '00:00:00';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('nameInput').disabled = false;
  startTime = null;
  log('リセット完了');
}

function setMeetingName(name) {
  meetingInfo.name = name;
  document.getElementById('nameInput').value = name;
  log('会議名を設定: ' + name);
}

/* ======== Scheduler API ======== */
window.MeetingRecorder = {
  start: startRecording,
  stop: stopRecording,
  cancel: cancelRecording,
  setName: setMeetingName,
  confirmFolder: requestFolderPermission,
  isRecording: function() { return mediaRecorder && mediaRecorder.state === 'recording'; },
  getState: function() { return mediaRecorder ? mediaRecorder.state : 'inactive'; },
  getDuration: function() { return startTime ? Math.floor((Date.now() - startTime) / 1000) : 0; },
  getMeetingName: function() { return getMeetingName(); },
  getFilename: function() { return window.recordingFilename || null; },
  getBlobSize: function() { return window.recordingBlob ? window.recordingBlob.size : 0; },
  isReady: function() { return window.recordingReady === true; },
  isSaving: function() { return window.isSaving === true; },
  isSaveComplete: function() { return window.saveComplete === true; },
  // backward compat
  isUploading: function() { return window.isSaving === true; },
  isUploadComplete: function() { return window.saveComplete === true; },
  hasFolderAccess: function() { return folderPermissionGranted; },
  reset: resetRecorder
};

/* ======== Init ======== */
window.addEventListener('load', initFolder);
</script>
</body>
</html>
